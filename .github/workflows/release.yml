name: Build Unsigned Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 9.0.1-tdev)'
        required: false
        default: '9.0.0-tdev'

jobs:
  build:
    name: Build Unsigned Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 22.1.7171670
        run: |
          echo "y" | sdkmanager "ndk;22.1.7171670"
          echo "y" | sdkmanager "cmake;3.22.1"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # EKSİK OLAN ANA GRADLE VE SETTINGS DOSYALARINI OLUŞTURUYORUZ
      - name: Generate missing root Gradle files
        run: |
          if [ ! -f "settings.gradle" ]; then
            echo "settings.gradle oluşturuluyor ve alt modüller bağlanıyor..."
            cat << 'EOF' > settings.gradle
            include ':app'
            include ':android_alsa'
            include ':android_sysvshm'
            include ':input_controls'
            include ':installable_components'
            EOF
          fi
          
          if [ ! -f "build.gradle" ]; then
            echo "Ana build.gradle oluşturuluyor..."
            cat << 'EOF' > build.gradle
            buildscript {
                repositories {
                    google()
                    mavenCentral()
                }
                dependencies {
                    classpath 'com.android.tools.build:gradle:8.2.0'
                }
            }
            allprojects {
                repositories {
                    google()
                    mavenCentral()
                    jitpack()
                }
            }
            EOF
          fi

      - name: Set version name
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version_name }}"
          fi
          echo "VERSION_NAME=$VERSION" >> $GITHUB_ENV
          if [ -f "app/build.gradle" ]; then
            sed -i "s/versionName .*/versionName \"$VERSION\"/" app/build.gradle
          fi

      - name: Build Unsigned Release APK
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew bulunamadı, sistemdeki Gradle ile oluşturuluyor..."
            gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             output/WinLtr-${{ env.VERSION_NAME }}-unsigned.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinLtr-${{ env.VERSION_NAME }}-unsigned
          path: output/WinLtr-${{ env.VERSION_NAME }}-unsigned.apk
          retention-days: 30
          
