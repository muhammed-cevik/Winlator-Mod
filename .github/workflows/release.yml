name: Build Unsigned Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 9.0.1-tdev)'
        required: false
        default: '9.0.0-tdev'

jobs:
  build:
    name: Build Unsigned Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Sadece JDK 17 kuruyoruz (SDK ve NDK bununla sorunsuz kurulacak)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 22.1.7171670
        run: |
          echo "y" | sdkmanager "ndk;22.1.7171670"
          echo "y" | sdkmanager "cmake;3.22.1"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set version name
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version_name }}"
          fi
          echo "VERSION_NAME=$VERSION" >> $GITHUB_ENV
          sed -i "s/versionName .*/versionName \"$VERSION\"/" app/build.gradle

      # Gradle komutunu çalıştırırken ortam değişkeni ile Java 11'i zorluyoruz
      - name: Build Unsigned Release APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_11_X64 }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             output/WinLtr-${{ env.VERSION_NAME }}-unsigned.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinLtr-${{ env.VERSION_NAME }}-unsigned
          path: output/WinLtr-${{ env.VERSION_NAME }}-unsigned.apk
          retention-days: 30
          
