name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '9.0.0-tdev'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install NDK and CMake
        run: |
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "ndk;22.1.7171670" "cmake;3.22.1"

      - name: Set version name
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version_name }}"
          fi
          echo "VERSION_NAME=$VERSION" >> $GITHUB_ENV
          sed -i "s/versionName .*/versionName \"$VERSION\"/" app/build.gradle

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/app-release.apk \
             output/WinLtr-${{ env.VERSION_NAME }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinLtr-${{ env.VERSION_NAME }}
          path: output/WinLtr-${{ env.VERSION_NAME }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: WinLtr ${{ env.VERSION_NAME }}
          body: |
            ## WinLtr ${{ env.VERSION_NAME }}

            ### Değişiklikler
            - 13 bug düzeltmesi
            - Performans iyileştirmeleri

            ### Kurulum
            APK'yı indirip Android cihazına kur (Android 8.0+, arm64).
          files: output/WinLtr-${{ env.VERSION_NAME }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
